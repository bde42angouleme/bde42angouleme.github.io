<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<link rel="preconnect" href="https://fonts.googleapis.com">
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
		<link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="theme-color" content="#000000" />
		<script src="https://unpkg.com/lenis@1.3.21/dist/lenis.min.js"></script>
		<script rel="preload" src="https://cdnjs.cloudflare.com/ajax/libs/bodymovin/5.13.0/lottie.min.js"></script>
		<link rel="preload" href="/lottie/eyes.json" as="fetch" crossorigin="anonymous" />
		<style>
			@font-face {
				font-family: 'Lugati v1';
				src: url('/fonts/Lugati.otf') format('opentype');
			}
			:root {
				--color-white: #F2F2F2;
				--color-black: #000000;
				--color-green: #99FFBA;
				--color-pink: #FD84FE;
				--color-purple: #9F99FF;
			}
			body {
				margin: 0;
				padding: 0;
				background: var(--color-black);
				color: var(--color-white);
				font-family: "Montserrat", sans-serif;
			}
			#preloader {
				position: fixed;
				top: -25%;
				left: -25%;
				width: 150%;
				height: 150%;
				z-index: 9999;
				display: flex;
				align-items: center;
				justify-content: center;
				transition: 1s cubic-bezier(.4,-0.5,0,1.05);
			}
			#lottie_container {
				width: 200px;
				height: 200px;
			}
			#app {
				transition: 1s cubic-bezier(.4,-0.5,0,1.05);
				overflow: hidden;
				transform-origin: 50% 50vh;
			}
			.hidden {
				transform: translateY(-150%);
			}
			.hidden_app {
				transform: scale(1.2);
				opacity: 0;
				filter: blur(20px);
			}
		</style>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div id="preloader">
			<div id="lottie_container"></div>
		</div>
		<div id="app" class="hidden_app">
			<div style="display: contents">%sveltekit.body%</div>
		</div>
		<script>
			const hidePreload = () => {
				setTimeout(() => {
					document.querySelector('#preloader').classList.add('hidden');
					document.querySelector('#app').classList.remove('hidden_app');
				}, 200);
			}
			if (document.readyState === "complete") {
				hidePreload()
			} else {
				window.addEventListener("load", () => {
					hidePreload()
				});
			}

			lottie.loadAnimation({
				container: document.getElementById('lottie_container'),
				renderer: "svg",
				loop: true,
				autoplay: true,
				path: '/lottie/eyes.json',
			});
			new Lenis({
				autoRaf: true,
			});
		</script>
	</body>
</html>
